name: pr

on:
  pull_request:

permissions:
  contents: read
  id-token: write
  pull-requests: write

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:

  pr:
    uses: rx-refill-reminders/pipeline/.github/workflows/pr.yml@test-plan-parsing
    secrets: inherit
