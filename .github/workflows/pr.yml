name: pr

on:
  pull_request:

permissions:
  contents: read
  id-token: write
  pull-requests: write

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      changed-component-types: ${{ steps.components-changed.outputs.changed-component-types }}
      changed-components-by-type: ${{ steps.components-changed.outputs.changed-components-by-type }}
    steps:
      -
        uses: actions/checkout@v6
      -
        name: Detect changed components
        id: components-changed
        uses: slingshot-pipelines/action-components-changed@v1

  check-components:
    needs:
      - detect-changes
    if: ${{ contains(needs.detect-changes.outputs.changed-component-types, '"components"') }}
    uses: slingshot-pipelines/workflows/.github/workflows/check-components.yml@check-components/v0
    secrets: inherit

  check-github-workflows:
    needs:
      - detect-changes
    if: ${{ contains(needs.detect-changes.outputs.changed-component-types, '"github-workflows"') }}
    uses: slingshot-pipelines/workflows/.github/workflows/check-github-workflows.yml@check-github-workflows/v1
    secrets: inherit

  check-lambdas:
    needs:
      - detect-changes
    if: ${{ contains(needs.detect-changes.outputs.changed-component-types, '"lambda"') }}
    uses: slingshot-pipelines/workflows/.github/workflows/check-lambdas.yml@check-lambdas/v0
    with:
      COMPONENTS: ${{ toJSON(fromJSON(needs.detect-changes.outputs.changed-components-by-type).lambda) }}
      TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION }}
      TERRAGRUNT_VERSION: ${{ vars.TERRAGRUNT_VERSION }}
    secrets: inherit

  check-infra:
    needs:
      - detect-changes
    if: ${{ contains(needs.detect-changes.outputs.changed-component-types, '"terragrunt-infra"') }}
    uses: slingshot-pipelines/workflows/.github/workflows/check-terragrunt-infras.yml@check-terragrunt-infras/v0
    with:
      COMPONENTS: ${{ toJSON(fromJSON(needs.detect-changes.outputs.changed-components-by-type).terragrunt-infra) }}
      TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION }}
      TERRAGRUNT_VERSION: ${{ vars.TERRAGRUNT_VERSION }}
    secrets: inherit

  pr-ready:
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - detect-changes
      - check-components
      - check-github-workflows
      - check-lambdas
      - check-infra
    steps:
      -
        uses: slingshot-pipelines/action-pr-ready@v0
        with:
          NEEDS: ${{ toJSON(needs) }}
